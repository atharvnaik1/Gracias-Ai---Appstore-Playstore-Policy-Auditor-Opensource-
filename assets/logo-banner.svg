<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="shieldGradBanner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bgGrad)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/><line x1="640" y1="0" x2="640" y2="200"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(60, 40) scale(1.5)">
    <path d="M24 2 L44 10 L44 26 C44 38 35 46 24 50 C13 46 4 38 4 26 L4 10 Z" fill="url(#shieldGradBanner)" stroke="#93C5FD" stroke-width="1" rx="4"/>
    <path d="M24 12 C24 12 18 18 18 26 L22 26 L20 34 L24 30 L28 34 L26 26 L30 26 C30 18 24 12 24 12Z" fill="white" opacity="0.95"/>
    <path d="M17 24 L22 29 L31 18" stroke="#FCD34D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text: ipaship -->
  <text x="155" y="105" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="#F1F5F9" letter-spacing="-1">
    <tspan fill="#60A5FA">ipa</tspan><tspan fill="#F1F5F9">Ship</tspan>
  </text>
  <!-- Tagline -->
  <text x="158" y="140" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="400" fill="#94A3B8" letter-spacing="2">
    APP STORE COMPLIANCE AUDITOR
  </text>
  <!-- Accent line -->
  <rect x="155" y="150" width="120" height="3" rx="1.5" fill="url(#accentLine)"/>
  <!-- Decorative dots -->
  <circle cx="700" cy="60" r="3" fill="#3B82F6" opacity="0.4"/>
  <circle cx="720" cy="80" r="2" fill="#60A5FA" opacity="0.3"/>
  <circle cx="740" cy="50" r="2.5" fill="#93C5FD" opacity="0.25"/>
  <circle cx="680" cy="140" r="2" fill="#3B82F6" opacity="0.3"/>
  <circle cx="750" cy="130" r="3" fill="#60A5FA" opacity="0.2"/>
</svg>